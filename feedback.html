<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maezanisi Enterprise Loans</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f6ff;
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            background-color: #2d6cdf;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Navigation */
        nav {
            background-color: #1b4fbf;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Form Container */
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #2d6cdf;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b4fbf;
        }
    </style>
</head>

<body>

    <!-- Header Section -->
    <header>
        <h1>Maezanisi Enterprise Loans</h1>
        <p>We offer only the best services</p>
    </header>

    <!-- Navigation -->
    <nav>
   <a href="index.html">Home</a>
   <a href="aboutus.html">About Us</a>
   <a href="contact.html">Contacts</a>
   <a href="documentation.html">Documentation</a>
   <a href="availableservicesproviders.html">Available services providers</a>
   <a href="methodsofpayments.html">Methods of payments</a>
   <a href="fqa.html">FAQs</a>
   <a href="feedback.html">Feedback</a>
   
</nav>

    <!-- Feedback Form -->
    <div class="container">

        <h2>Loan Service Feedback</h2>

        <form action="#" method="post">

            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Type of Loan</label>
            <select name="loan_type">
                <option>Personal Loan</option>
                <option>Business Loan</option>
                <option>Student Loan</option>
            </select>

            <label>Rate Our Service</label>
            <select name="rating">
                <option>Excellent</option>
                <option>Good</option>
                <option>Average</option>
                <option>Poor</option>
            </select>

            <label>Your Feedback</label>
            <textarea name="message" rows="4" placeholder="Write your feedback..." required></textarea>

            <button type="submit">Submit Feedback</button>

        </form>

    </div>

</body>
</html>
